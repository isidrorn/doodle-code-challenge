# Run without docker: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
spring:
  datasource:
    url: jdbc:h2:mem:minidoodle;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
  flyway:
    # Flyway's migrations (db/migration) are hand-written Postgres SQL for the docker-compose
    # profile; local dev keeps the fast Hibernate-generated H2 schema instead. See
    # design-decisions-v4.md.
    enabled: false
